<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนนักศึกษา</title>
    <script src="https://cdn.tailwindcss.com"></script> //ดึง Framework สำหรับตกแต่งเว็บไซต์
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet"> //เชื่อมต่อ Google Fonts เพื่อยืมฟอนต์
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="sticky top-0 z-50 bg-white shadow-md p-4 flex justify-between items-center">
        <div class="text-xl font-bold text-blue-600">Student Reg</div>
        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
            ลงทะเบียน
        </button>
    </nav>
        <main class="container mx-auto mt-10 p-4 flex justify-center">
            <div id="form-container" class="bg-white p-8 rounded-2xl shadow-xl w-full max-auto max-w-2xl">
                <h2 class="text-2xl font-semibold mb-6 text-gray-800">กรอกข้อมูลนักศึกษา</h2>
                <form id="reg-form" class="space-y-4">
                    <div>
                        <label class="block text-gray-700">ชื่อ-นามสกุล</label>
                        <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700">รหัสนักศึกษา</label>
                            <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-700">คณะ/สาขา</label>
                            <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700">อีเมล</label>
                        <input type="email" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 mt-4">
                        ยืนยันการลงทะเบียน
                    </button>
                </form>
            </div>
            <div id="success-msg" class="hidden text-center bg-white p-10 rounded-2xl shadow-lg">
                <h2 class="text-3xl font-bold text-green-600 mb-2">ลงทะเบียนสำเร็จ</h2>
                <p class="text-gray-600">ขอบคุณที่ส่งข้อมูลเข้าสู่ระบบ</p>
            </div>
        </main>
    <script>
        const regForm = document.getElementById('reg-form');
        const formContainer = document.getElementById('form-container');
        const successMsg = document.getElementById('success-msg');

        regForm.addEventListener('submit', function(event) {
            // ป้องกันหน้าเว็บโหลดใหม่ (Refresh)
            event.preventDefault();

            // ทำการซ่อนฟอร์ม และแสดงข้อความสำเร็จ
            formContainer.classList.add('hidden');
            successMsg.classList.remove('hidden');
        });
    </script>
</body>
</html>
